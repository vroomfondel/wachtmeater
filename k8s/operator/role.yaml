---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wachtmeater-operator
  namespace: meater
rules:
  # Watcher Jobs — full lifecycle so the operator can create/replace/delete them.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods — read-only, used by `operator status` / log inspection.
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Secrets — operator renders the per-watcher wachtmeater.toml into a Secret.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
